<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Table Trainer ✕ Multiplication & Division Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0a1a;--surface:#12122a;--surface2:#1a1a35;--border:#2a2a55;
  --accent:#f7c948;--accent2:#ff6b6b;--accent3:#4ecdc4;--accent4:#a78bfa;
  --text:#e8e8ff;--text2:#9090c0;--correct:#4ade80;--wrong:#f87171;
  --glow:0 0 20px rgba(247,201,72,0.4);--glow2:0 0 20px rgba(78,205,196,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(78,205,196,.04) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 20%,rgba(167,139,250,.05) 0%,transparent 50%),
  radial-gradient(ellipse at 60% 80%,rgba(247,201,72,.04) 0%,transparent 50%);}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d,3s) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1}to{opacity:.9}}
#root{position:relative;z-index:1;}

/* Layout */
.app{min-height:100vh;display:flex;flex-direction:column;}
.header{text-align:center;padding:18px 20px 12px;border-bottom:1px solid var(--border);
  background:rgba(18,18,42,.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Baloo 2',cursive;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent4));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px;}
.tagline{color:var(--text2);font-size:.82rem;margin-top:1px;}

/* TTS bar */
.tts-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:8px 16px;background:rgba(10,10,26,.6);border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.tts-label{color:var(--text2);font-size:.8rem;font-weight:700;}
.tts-toggle{
  display:flex;align-items:center;gap:6px;cursor:pointer;
  padding:5px 14px;border-radius:50px;border:2px solid var(--border);
  background:transparent;color:var(--text2);font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;
  transition:all .2s;
}
.tts-toggle.on{background:rgba(78,205,196,.15);border-color:var(--accent3);color:var(--accent3);}
.tts-toggle .dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .2s;}
.tts-toggle.on .dot{background:var(--accent3);box-shadow:0 0 8px var(--accent3);}
.tts-select{padding:5px 10px;border-radius:8px;border:2px solid var(--border);
  background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;}
.tts-speed-row{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:.8rem;font-weight:700;}
.tts-range{-webkit-appearance:none;height:4px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent3),var(--accent));outline:none;cursor:pointer;width:80px;}
.tts-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:white;box-shadow:0 0 6px rgba(0,0,0,.5);}

.nav-tabs{display:flex;justify-content:center;gap:8px;padding:12px 16px;flex-wrap:wrap;}
.nav-tab{padding:7px 18px;border-radius:50px;border:2px solid var(--border);background:transparent;
  color:var(--text2);font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all .2s;}
.nav-tab:hover{border-color:var(--accent);color:var(--accent);}
.nav-tab.active{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:var(--glow);}

.main{flex:1;padding:14px 18px 40px;max-width:920px;margin:0 auto;width:100%;}

/* Table grid */
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:8px;margin-bottom:20px;}
.table-btn{aspect-ratio:1;border-radius:14px;border:2px solid var(--border);
  background:var(--surface);color:var(--text2);font-family:'Baloo 2',cursive;
  font-size:1.35rem;font-weight:700;cursor:pointer;transition:all .2s;}
.table-btn:hover{transform:translateY(-2px) scale(1.04);border-color:var(--accent3);color:var(--accent3);box-shadow:var(--glow2);}
.table-btn.selected{background:var(--accent);color:#000;border-color:var(--accent);box-shadow:var(--glow);transform:scale(1.04);}

/* Shared btns */
.btn-primary{padding:11px 30px;border-radius:50px;background:linear-gradient(135deg,var(--accent),#ffaa00);
  color:#000;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
  border:none;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(247,201,72,.4);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(247,201,72,.5);}
.btn-secondary{padding:11px 22px;border-radius:50px;border:2px solid var(--border);background:transparent;
  color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:var(--text2);}
.op-btn{padding:7px 16px;border-radius:50px;border:2px solid var(--border);background:transparent;
  color:var(--text2);font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;}
.op-btn.active{background:var(--accent3);color:#000;border-color:var(--accent3);}

/* Learn */
.learn-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.learn-title{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:var(--accent);}
.op-toggle{display:flex;gap:8px;}
.facts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;}
.fact-card{background:var(--surface);border:2px solid var(--border);border-radius:15px;padding:15px;
  text-align:center;cursor:pointer;transition:all .25s;position:relative;animation:fadeIn .3s ease both;}
.fact-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow);}
.fact-card.mastered{border-color:var(--correct);background:rgba(74,222,128,.08);}
.fact-equation{font-family:'Baloo 2',cursive;font-size:1.25rem;font-weight:700;color:var(--text);}
.fact-answer{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--accent);margin-top:4px;}
.fact-badge{position:absolute;top:7px;right:7px;width:20px;height:20px;border-radius:50%;
  background:var(--correct);display:flex;align-items:center;justify-content:center;
  font-size:.65rem;color:#000;font-weight:900;opacity:0;transition:opacity .2s;}
.fact-card.mastered .fact-badge{opacity:1;}

/* Rhythm */
.rhythm-container{text-align:center;}
.rhythm-settings{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.rhythm-bpm-display{font-family:'Baloo 2',cursive;font-size:1rem;color:var(--accent);display:flex;align-items:center;gap:6px;}
.bpm-slider{-webkit-appearance:none;height:6px;border-radius:3px;
  background:linear-gradient(90deg,var(--accent3),var(--accent));outline:none;cursor:pointer;width:110px;}
.bpm-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:white;box-shadow:0 0 8px rgba(0,0,0,.5);}
.rhythm-display{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;}
.rhythm-fact{font-family:'Baloo 2',cursive;font-size:clamp(2.5rem,8vw,5rem);font-weight:800;color:var(--text);line-height:1.1;}
.rhythm-fact.pulse{animation:rhythmPulse .15s ease-out;}
@keyframes rhythmPulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.rhythm-answer{font-family:'Baloo 2',cursive;font-size:clamp(3rem,10vw,6rem);font-weight:800;
  color:var(--accent);text-shadow:0 0 30px rgba(247,201,72,.6);margin-top:4px;}
.rhythm-progress-bar{width:260px;height:8px;background:var(--surface2);border-radius:4px;margin-top:14px;overflow:hidden;}
.rhythm-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent3),var(--accent));transition:width .05s linear;}
.rhythm-controls{display:flex;gap:12px;margin-top:20px;justify-content:center;}
.rhythm-counter{font-family:'Baloo 2',cursive;font-size:1.1rem;color:var(--text2);margin-top:8px;}
.beat-dots{display:flex;gap:8px;justify-content:center;margin-top:10px;}
.beat-dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:all .1s;}
.beat-dot.active{background:var(--accent);box-shadow:0 0 12px var(--accent);}

/* Test config */
.test-config{background:var(--surface);border:2px solid var(--border);border-radius:18px;padding:22px;margin-bottom:20px;}
.test-config h3{font-family:'Baloo 2',cursive;font-size:1.3rem;color:var(--accent);margin-bottom:14px;}
.config-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;margin-bottom:12px;}
.config-label{color:var(--text2);font-size:.88rem;min-width:96px;font-weight:700;padding-top:4px;}
.config-select{padding:7px 13px;border-radius:9px;border:2px solid var(--border);
  background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;}
.tables-multiselect{display:flex;flex-wrap:wrap;gap:5px;}
.ts-chip{padding:4px 11px;border-radius:50px;border:2px solid var(--border);background:transparent;
  color:var(--text2);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;}
.ts-chip.sel{background:var(--accent4);color:#fff;border-color:var(--accent4);}
.ts-chip-all{border-color:var(--accent2);}
.ts-chip-all.sel{background:var(--accent2);color:#fff;}

/* Test type cards */
.test-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:14px;}
.test-type-card{
  border:2px solid var(--border);background:var(--surface);border-radius:14px;
  padding:14px 16px;cursor:pointer;transition:all .2s;text-align:left;
}
.test-type-card:hover{border-color:var(--accent4);transform:translateY(-2px);}
.test-type-card.sel{border-color:var(--accent4);background:rgba(167,139,250,.12);}
.ttc-icon{font-size:1.6rem;margin-bottom:6px;}
.ttc-name{font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;color:var(--text);}
.ttc-desc{font-size:.75rem;color:var(--text2);margin-top:3px;line-height:1.3;}

/* Test arena */
.test-arena{display:flex;flex-direction:column;align-items:center;min-height:420px;}
.test-meta{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;}
.meta-pill{padding:5px 14px;border-radius:50px;background:var(--surface);border:2px solid var(--border);
  font-size:.83rem;font-weight:700;color:var(--text2);}
.meta-pill span{color:var(--text);}
.timer-pill{border-color:var(--accent2);}
.timer-pill span{color:var(--accent2);}
.score-pill{border-color:var(--correct);}
.score-pill span{color:var(--correct);}
.streak-pill{border-color:var(--accent);}
.streak-pill span{color:var(--accent);}

.question-box{background:var(--surface);border:3px solid var(--border);
  border-radius:22px;padding:28px 36px;text-align:center;margin-bottom:20px;min-width:260px;transition:border-color .2s;}
.question-box.correct-flash{border-color:var(--correct)!important;animation:flashGreen .4s;}
.question-box.wrong-flash{border-color:var(--wrong)!important;animation:flashRed .4s;}
@keyframes flashGreen{0%,100%{box-shadow:none}50%{box-shadow:0 0 30px rgba(74,222,128,.5)}}
@keyframes flashRed{0%,100%{box-shadow:none}50%{box-shadow:0 0 30px rgba(248,113,113,.5)}}

.question-text{font-family:'Baloo 2',cursive;font-size:clamp(1.8rem,5vw,3.2rem);font-weight:800;color:var(--text);}
.question-text .blank{color:var(--accent);border-bottom:4px solid var(--accent);min-width:56px;display:inline-block;text-align:center;}
.question-hint{font-size:.82rem;color:var(--text2);margin-top:8px;font-weight:600;}

/* Numpad (no check button) */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:230px;margin:0 auto;}
.numpad-btn{padding:13px;border-radius:13px;border:2px solid var(--border);background:var(--surface);
  color:var(--text);font-family:'Baloo 2',cursive;font-size:1.25rem;font-weight:700;cursor:pointer;transition:all .15s;}
.numpad-btn:hover{background:var(--surface2);border-color:var(--accent);transform:scale(1.05);}
.numpad-btn.numpad-zero{grid-column:span 2;}
.numpad-btn.numpad-del{border-color:var(--accent2);color:var(--accent2);}

/* Auto-submit indicator */
.auto-indicator{
  display:flex;align-items:center;gap:6px;
  font-size:.78rem;color:var(--text2);margin-top:10px;font-weight:600;
}
.auto-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);
  animation:autoPulse 1s ease-in-out infinite alternate;}
@keyframes autoPulse{from{opacity:.4}to{opacity:1;box-shadow:0 0 8px var(--accent3)}}

/* MCQ options */
.mcq-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:340px;margin:0 auto;}
.mcq-btn{
  padding:18px 14px;border-radius:16px;border:2px solid var(--border);
  background:var(--surface);color:var(--text);
  font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:800;
  cursor:pointer;transition:all .2s;text-align:center;
}
.mcq-btn:hover{border-color:var(--accent3);background:rgba(78,205,196,.08);transform:scale(1.03);}
.mcq-btn.correct-choice{border-color:var(--correct);background:rgba(74,222,128,.2);color:var(--correct);}
.mcq-btn.wrong-choice{border-color:var(--wrong);background:rgba(248,113,113,.15);color:var(--wrong);}

/* Speed blitz */
.blitz-display{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  background:var(--surface);border:3px solid var(--accent2);border-radius:20px;
  padding:24px 40px;margin-bottom:18px;min-width:280px;
  box-shadow:0 0 30px rgba(255,107,107,.2);
}
.blitz-fact{font-family:'Baloo 2',cursive;font-size:clamp(2.2rem,6vw,3.8rem);font-weight:800;color:var(--text);}
.blitz-timer-bar{width:100%;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px;}
.blitz-timer-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--correct),var(--accent));transition:width .1s linear;}

/* Progress bar */
.test-progress-bar{width:100%;max-width:400px;height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;margin-bottom:18px;}
.test-progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent3),var(--accent));transition:width .3s ease;}

/* Results */
.results-panel{background:var(--surface);border:2px solid var(--border);
  border-radius:22px;padding:28px;text-align:center;max-width:520px;margin:0 auto;}
.results-score{font-family:'Baloo 2',cursive;font-size:4.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.results-label{color:var(--text2);font-size:1rem;margin-bottom:18px;}
.results-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.stat-box{padding:11px 18px;border-radius:13px;border:2px solid var(--border);min-width:82px;}
.stat-value{font-family:'Baloo 2',cursive;font-size:1.7rem;font-weight:800;}
.stat-desc{font-size:.72rem;color:var(--text2);margin-top:2px;}
.correct-stat .stat-value{color:var(--correct);}
.wrong-stat .stat-value{color:var(--wrong);}
.time-stat .stat-value{color:var(--accent3);}
.streak-stat .stat-value{color:var(--accent);}
.missed-list{text-align:left;margin-top:14px;}
.missed-title{font-weight:800;color:var(--wrong);margin-bottom:7px;font-size:.88rem;}
.missed-item{display:inline-block;padding:3px 9px;border-radius:7px;
  background:rgba(248,113,113,.1);border:1px solid var(--wrong);color:var(--text);font-size:.82rem;margin:3px;font-weight:700;}
.grade-badge{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;font-family:'Baloo 2',cursive;font-size:1.9rem;font-weight:800;border:4px solid;}
.grade-A{border-color:var(--correct);background:rgba(74,222,128,.15);color:var(--correct);}
.grade-B{border-color:var(--accent3);background:rgba(78,205,196,.15);color:var(--accent3);}
.grade-C{border-color:var(--accent);background:rgba(247,201,72,.15);color:var(--accent);}
.grade-D{border-color:var(--wrong);background:rgba(248,113,113,.15);color:var(--wrong);}

/* Progress tab */
.mastery-section{margin-top:20px;background:var(--surface);border:2px solid var(--border);border-radius:15px;padding:15px;}
.mastery-title{font-weight:800;color:var(--text2);font-size:.83rem;margin-bottom:11px;}
.mastery-bars{display:flex;flex-direction:column;gap:7px;}
.mastery-row{display:flex;align-items:center;gap:10px;}
.mastery-table-label{width:38px;color:var(--text2);font-weight:700;font-size:.83rem;text-align:right;}
.mastery-bar-track{flex:1;height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.mastery-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent4),var(--accent3));transition:width .5s ease;}
.mastery-pct{width:34px;text-align:right;font-size:.78rem;color:var(--text2);font-weight:700;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes floatUp{0%{transform:translate(-50%,-50%) scale(0);opacity:1}30%{transform:translate(-50%,-70%) scale(1.2)}100%{transform:translate(-50%,-120%) scale(1);opacity:0}}
.fade-in{animation:fadeIn .4s ease both;}
.pop-in{animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;}

select option{background:var(--surface2);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:480px){.main{padding:10px;}.table-grid{grid-template-columns:repeat(5,1fr);gap:6px;}.mcq-options{grid-template-columns:1fr 1fr;}}

/* Collapsible table selector */
.table-selector-toggle{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:8px 14px;border-radius:50px;border:2px solid var(--border);
  background:var(--surface);color:var(--text2);
  font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;
  transition:all .2s;width:100%;margin-bottom:10px;
  user-select:none;
}
.table-selector-toggle:hover{border-color:var(--accent3);color:var(--accent3);}
.table-selector-toggle .tst-badge{
  margin-left:auto;display:flex;align-items:center;gap:6px;
}
.table-selector-toggle .tst-num{
  background:var(--accent);color:#000;border-radius:50px;
  padding:2px 10px;font-size:.78rem;font-weight:800;
  font-family:'Baloo 2',cursive;
}
.table-selector-toggle .tst-arrow{
  font-size:.75rem;transition:transform .25s;display:inline-block;
}
.table-selector-toggle.open .tst-arrow{transform:rotate(180deg);}
.table-selector-body{
  overflow:hidden;
  max-height:0;
  transition:max-height .3s ease,opacity .25s ease,margin .25s ease;
  opacity:0;
  margin-bottom:0;
}
.table-selector-body.open{
  max-height:300px;
  opacity:1;
  margin-bottom:16px;
}
</style></head>
<body>
<div class="stars-bg" id="starsContainer"></div>
<div id="root"></div>

<script src="../vendor/react.production.min.js"></script>
<script src="../vendor/react-dom.production.min.js"></script>
<script src="./app.bundle.js"></script>
</body>
</html>
