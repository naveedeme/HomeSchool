name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare site files
        run: |
          rm -rf .deploy
          mkdir -p .deploy
          cp HomeSchool.html .deploy/index.html
          cp HomeSchool.html .deploy/HomeSchool.html
          if [ -f manifest.webmanifest ]; then
            cp manifest.webmanifest .deploy/manifest.webmanifest
          fi
          if [ -f sw.js ]; then
            cp sw.js .deploy/sw.js
          fi
          if [ -d js ]; then
            cp -R js .deploy/js
          fi
          if [ -d css ]; then
            cp -R css .deploy/css
          fi
          if [ -d img ]; then
            cp -R img .deploy/img
          fi
          if [ -d vendor ]; then
            cp -R vendor .deploy/vendor
          fi
          if [ -d typing-tutor ]; then
            cp -R typing-tutor .deploy/typing-tutor
          fi
          if [ -d table-tutor ]; then
            cp -R table-tutor .deploy/table-tutor
          fi
          touch .deploy/.nojekyll

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd .deploy
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy site from main" || exit 0
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
